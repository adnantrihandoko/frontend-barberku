name: barberku_app
description: "Digital queue system for barbershop - Customer & Admin app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.2.0
  
  # WebSocket
  web_socket_channel: ^3.0.0
  
  # Logging
  logger: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # HTTP Client
  dio: ^5.5.0+1
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  
  # Code Generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
